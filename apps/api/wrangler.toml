name = "formplan-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — måste finnas här, annars raderar `wrangler deploy` den
# routning som satts via Cloudflare-dashboarden. En custom domain dirigerar
# all trafik (alla paths) för värdnamnet till workern.
routes = [
  { pattern = "api.formplan.app", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
# AI-provider: "anthropic" (standard) eller "gemini" (gratis nivå för test).
AI_PROVIDER = "gemini"

# Secrets (set via `wrangler secret put`):
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# ANTHROPIC_API_KEY
# GEMINI_API_KEY        # krävs när AI_PROVIDER=gemini (hämtas på aistudio.google.com)
# GEMINI_MODEL          # valfri, standard: gemini-2.5-flash
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# WEBHOOK_SECRET
# ADMIN_EMAILS          # valfri: kommaseparerad lista med admin-mejladresser
#                       # (t.ex. "anna@formplan.app,bo@formplan.app") som får
#                       # använda admin-endpoints som /email/newsletter.
#                       # Osatt ⇒ inga admins ⇒ 403.

[triggers]
crons = ["0 7 * * 1"]  # Varje måndag kl 07:00 UTC

